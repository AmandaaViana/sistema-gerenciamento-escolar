<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Professores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        .card-header h3 {
            margin: 0;
        }

        .menu-topo {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- MENU -->
    <div class="menu-topo">

        <a th:href="@{/view/alunos}"
           class="btn btn-primary">
            Alunos
        </a>

        <a th:href="@{/view/professores}"
           class="btn btn-success">
            Professores
        </a>

        <a th:href="@{/view/turmas}"
           class="btn btn-warning">
            Turmas
        </a>

        <a th:href="@{/view/disciplinas}"
           class="btn btn-info">
            Disciplinas
        </a>

    </div>

    <!-- FORMULÁRIO -->
    <div class="card">

        <div class="card-header bg-primary text-white">
            <h3>Cadastro de Professores</h3>
        </div>

        <div class="card-body">

            <!-- PESQUISA -->

            <form th:action="@{/view/professores/pesquisar}"
                  method="get"
                  class="row mb-4">

                <div class="col-md-10">
                    <input type="text"
                           name="nome"
                           class="form-control"
                           placeholder="Pesquisar professor por nome">
                </div>

                <div class="col-md-2">
                    <button type="submit"
                            class="btn btn-primary w-100">
                        Pesquisar
                    </button>
                </div>

            </form>

            <hr>

            <!-- FORM CADASTRO -->

            <form th:action="@{/view/professores/salvar}"
                  th:object="${professor}"
                  method="post">

                <input type="hidden"
                       th:field="*{idProfessor}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nome}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">CPF</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{cpf}"
                               placeholder="000.000.000-00"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               th:field="*{email}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{telefone}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Especialidade</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{especialidade}">
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Salvar
                </button>

                <a th:href="@{/view/professores}"
                   class="btn btn-secondary">
                    Novo
                </a>

                <a th:href="@{/view/alunos}"
                   class="btn btn-primary">
                    Ir para Alunos
                </a>

            </form>

        </div>

    </div>

    <br>

    <!-- TABELA -->

    <div class="card">

        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Lista de Professores</h5>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover table-striped">

                <thead class="table-primary">

                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Especialidade</th>
                        <th width="200">Ações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="professor : ${professores}">

                        <td th:text="${professor.idProfessor}"></td>
                        <td th:text="${professor.nome}"></td>
                        <td th:text="${professor.cpf}"></td>
                        <td th:text="${professor.email}"></td>
                        <td th:text="${professor.telefone}"></td>
                        <td th:text="${professor.especialidade}"></td>

                        <td>

                            <a th:href="@{/view/professores/editar/{id}(id=${professor.idProfessor})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/view/professores/excluir/{id}(id=${professor.idProfessor})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Deseja excluir este professor?')">
                                Excluir
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(professores)}">
                        <td colspan="7"
                            class="text-center text-muted">
                            Nenhum professor cadastrado.
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
