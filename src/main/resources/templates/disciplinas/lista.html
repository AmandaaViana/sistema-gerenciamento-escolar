
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Disciplinas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        .card-header h3 {
            margin: 0;
        }

        .menu-topo {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- MENU -->

    <div class="menu-topo">

        <a th:href="@{/view/alunos}"
           class="btn btn-primary">
            Alunos
        </a>

        <a th:href="@{/view/professores}"
           class="btn btn-success">
            Professores
        </a>

        <a th:href="@{/view/turmas}"
           class="btn btn-warning">
            Turmas
        </a>

        <a th:href="@{/view/disciplinas}"
           class="btn btn-info">
            Disciplinas
        </a>

    </div>

    <!-- FORMULÁRIO -->

    <div class="card">

        <div class="card-header bg-info text-white">
            <h3>Cadastro de Disciplinas</h3>
        </div>

        <div class="card-body">

            <!-- PESQUISA -->

            <form th:action="@{/view/disciplinas/pesquisar}"
                  method="get"
                  class="row mb-4">

                <div class="col-md-10">
                    <input type="text"
                           name="nome"
                           class="form-control"
                           placeholder="Pesquisar disciplina">
                </div>

                <div class="col-md-2">
                    <button type="submit"
                            class="btn btn-primary w-100">
                        Pesquisar
                    </button>
                </div>

            </form>

            <hr>

            <!-- CADASTRO -->

            <form th:action="@{/view/disciplinas/salvar}"
                  th:object="${disciplina}"
                  method="post">

                <input type="hidden"
                       th:field="*{idDisciplina}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Nome da Disciplina
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{nomeDisciplina}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Carga Horária
                        </label>

                        <input type="number"
                               class="form-control"
                               th:field="*{cargaHoraria}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Professor
                        </label>

                        <select class="form-select"
                                th:field="*{professor}"
                                required>

                            <option value="">
                                Selecione
                            </option>

                            <option th:each="prof : ${professores}"
                                    th:value="${prof.idProfessor}"
                                    th:text="${prof.nome}">
                            </option>

                        </select>

                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Salvar
                </button>

                <a th:href="@{/view/disciplinas}"
                   class="btn btn-secondary">
                    Novo
                </a>

            </form>

        </div>

    </div>

    <br>

    <!-- TABELA -->

    <div class="card">

        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">
                Lista de Disciplinas
            </h5>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover table-striped">

                <thead class="table-info">

                    <tr>
                        <th>ID</th>
                        <th>Disciplina</th>
                        <th>Carga Horária</th>
                        <th>Professor</th>
                        <th width="200">Ações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="disciplina : ${disciplinas}">

                        <td th:text="${disciplina.idDisciplina}"></td>

                        <td th:text="${disciplina.nomeDisciplina}"></td>

                        <td th:text="${disciplina.cargaHoraria}"></td>

                        <td th:text="${disciplina.professor.nome}"></td>

                        <td>

                            <a th:href="@{/view/disciplinas/editar/{id}(id=${disciplina.idDisciplina})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/view/disciplinas/excluir/{id}(id=${disciplina.idDisciplina})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Deseja excluir esta disciplina?')">
                                Excluir
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(disciplinas)}">

                        <td colspan="5"
                            class="text-center text-muted">

                            Nenhuma disciplina cadastrada.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
```
