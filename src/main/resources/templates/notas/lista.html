<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema de Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.1);
        }

        .titulo{
            font-weight:bold;
        }

        .navbar{
            box-shadow:0 2px 10px rgba(0,0,0,.2);
        }

    </style>

</head>

<body>

<!-- MENU -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

   

</nav>

<div class="container mt-4">





    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold"
               th:href="@{/view/alunos}">

                <i class="fa-solid fa-school"></i>
                Sistema Escolar

            </a>

            <div class="d-flex gap-2">

                <a th:href="@{/view/alunos}"
                   class="btn btn-light">

                    <i class="fa-solid fa-house"></i>
                    Início

                </a>

                <a th:href="@{/view/alunos}"
                   class="btn btn-success">

                    <i class="fa-solid fa-user-graduate"></i>
                    Alunos

                </a>

                <a th:href="@{/view/disciplinas}"
                   class="btn btn-warning">

                    <i class="fa-solid fa-clipboard-check"></i>
                    Disciplinas

                </a>

                <a th:href="@{/logout}"
                   class="btn btn-danger">

                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair

                </a>

            </div>

        </div>

    </nav>
























    <h2 class="titulo mb-4">

        <i class="fa-solid fa-clipboard-check"></i>

        Sistema de Notas

    </h2>

    <!-- FORMULÁRIO -->

    <div class="card mb-4">

        <div class="card-header bg-primary text-white">

            <i class="fa-solid fa-file-pen"></i>

            <span th:if="${nota.idNota == null}">
                Nova Nota
            </span>

            <span th:if="${nota.idNota != null}">
                Editar Nota
            </span>

        </div>

        <div class="card-body">

            <form th:action="@{/view/notas/salvar}"
                  th:object="${nota}"
                  method="post">

                <input type="hidden"
                       th:field="*{idNota}">

                <!-- EDIÇÃO -->

                <div th:if="${nota.idNota != null}">

                    <input type="hidden"
                           th:field="*{aluno.idAluno}">

                    <input type="hidden"
                           th:field="*{disciplina.idDisciplina}">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Aluno
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:value="${nota.aluno.nome + ' - CPF: ' + nota.aluno.cpf}"
                                   readonly>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Disciplina
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:value="${nota.disciplina.nomeDisciplina}"
                                   readonly>

                        </div>

                    </div>

                </div>

                <!-- NOVO CADASTRO -->

                <div th:if="${nota.idNota == null}">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Aluno
                            </label>

                            <select class="form-select"
                                    th:field="*{aluno.idAluno}"
                                    required>

                                <option value="">
                                    Selecione o aluno
                                </option>

                                <option th:each="a : ${alunos}"
                                        th:value="${a.idAluno}"
                                        th:text="${a.nome + ' | CPF: ' + a.cpf}">
                                </option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Disciplina
                            </label>

                            <select class="form-select"
                                    th:field="*{disciplina.idDisciplina}"
                                    required>

                                <option value="">
                                    Selecione a disciplina
                                </option>

                                <option th:each="d : ${disciplinas}"
                                        th:value="${d.idDisciplina}"
                                        th:text="${d.nomeDisciplina}">
                                </option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- NOTAS -->

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Nota 1
                        </label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="10"
                               class="form-control"
                               th:field="*{nota1}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Nota 2
                        </label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="10"
                               class="form-control"
                               th:field="*{nota2}">

                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    <i class="fa-solid fa-floppy-disk"></i>

                    <span th:if="${nota.idNota == null}">
                        Salvar
                    </span>

                    <span th:if="${nota.idNota != null}">
                        Atualizar
                    </span>

                </button>

                <a th:href="@{/view/notas}"
                   class="btn btn-secondary">

                    <i class="fa-solid fa-rotate-left"></i>
                    Cancelar

                </a>

            </form>

        </div>

    </div>

    <!-- TABELA -->

    <div class="card">

        <div class="card-header bg-dark text-white">

            <i class="fa-solid fa-list"></i>

            Lista de Notas

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Aluno</th>
                    <th>CPF</th>
                    <th>Disciplina</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Média</th>
                    <th>Situação</th>
                    <th>Ações</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="n : ${notas}">

                    <td th:text="${n.idNota}"></td>

                    <td th:text="${n.aluno.nome}"></td>

                    <td th:text="${n.aluno.cpf}"></td>

                    <td th:text="${n.disciplina.nomeDisciplina}"></td>

                    <td th:text="${n.nota1}"></td>

                    <td th:text="${n.nota2}"></td>

                    <td>

                        <span th:text="${n.media != null ? #numbers.formatDecimal(n.media,1,1) : '-'}">
                        </span>

                    </td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${n.situacao == 'APROVADO'}">
                            APROVADO
                        </span>

                        <span class="badge bg-danger"
                              th:if="${n.situacao == 'REPROVADO'}">
                            REPROVADO
                        </span>

                        <span class="badge bg-warning text-dark"
                              th:if="${n.situacao == 'PENDENTE'}">
                            PENDENTE
                        </span>

                    </td>

                    <td>

                        <a th:href="@{'/view/notas/editar/' + ${n.idNota}}"
                           class="btn btn-primary btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{'/view/notas/deletar/' + ${n.idNota}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Deseja excluir esta nota?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
