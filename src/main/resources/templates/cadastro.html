
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cadastro de Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:linear-gradient(135deg,#0d6efd,#6f42c1);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card-cadastro{
            width:550px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:26px;
            font-weight:bold;
            padding:20px;
        }

        .logo{
            text-align:center;
            font-size:70px;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .btn-cadastrar{
            height:50px;
            font-size:18px;
            font-weight:bold;
        }

        .perfil-info{
            font-size:14px;
            color:#6c757d;
        }

    </style>

</head>

<body>

<div class="card card-cadastro">

    <div class="card-header">
        <i class="fa-solid fa-user-plus"></i>
        Cadastro de Usuário
    </div>

    <div class="card-body p-4">

        <div class="logo">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <!-- ERRO -->

        <div th:if="${erro}"
             class="alert alert-danger alert-dismissible fade show">

            <span th:text="${erro}"></span>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>

        <!-- SUCESSO -->

        <div th:if="${sucesso}"
             class="alert alert-success alert-dismissible fade show">

            <span th:text="${sucesso}"></span>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>

        <form th:action="@{/cadastro}"
              method="post"
              th:object="${usuario}" autocomplete="off">

            <!-- USUÁRIO -->

            <div class="mb-3">

                <label class="form-label">
                    Usuário
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{username}"
                       autocomplete="off"
                       placeholder="Digite o usuário x"
                       required>

            </div>

            <!-- SENHA -->

            <div class="mb-3">

                <label class="form-label">
                    Senha
                </label>

                <input type="password"
                       class="form-control"
                        autocomplete="new-password"
                       th:field="*{password}"
                       placeholder="Digite a senha"
                       required>

            </div>

            <!-- PERFIL -->

            <div class="mb-3">

                <label class="form-label">
                    Perfil de Acesso
                </label>

                <select class="form-select"
                        th:field="*{role}"
                        required>

                    <option value="USUARIO">
                        Usuário
                    </option>

                    <option value="GERENTE">
                        Gerente
                    </option>

                    <!-- Somente ADMIN pode criar ADMIN -->

                    <option value="ADMINISTRADOR"
                            sec:authorize="hasRole('ADMINISTRADOR')">
                        Administrador
                    </option>

                </select>

                <div class="perfil-info mt-2">

                    <strong>Usuário:</strong>
                    utiliza o sistema.

                    <br>

                    <strong>Gerente:</strong>
                    pode cadastrar usuários.

                    <br>

                    <strong>Administrador:</strong>
                    acesso total ao sistema.

                </div>

            </div>

            <!-- BOTÃO -->

            <button type="submit"
                    class="btn btn-primary w-100 btn-cadastrar">

                <i class="fa-solid fa-floppy-disk"></i>
                Cadastrar Usuário

            </button>

        </form>

        <hr>

        <div class="d-grid gap-2">

            <a th:href="@{/view/alunos}"
               class="btn btn-success">

                <i class="fa-solid fa-house"></i>
                Voltar ao Sistema

            </a>

            <a th:href="@{/login}"
               class="btn btn-outline-secondary">

                <i class="fa-solid fa-arrow-left"></i>
                Voltar para Login

            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
