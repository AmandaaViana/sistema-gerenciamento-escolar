<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Turma</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Cadastro de Turma</h2>

    <form th:action="@{/view/turmas/salvar}"
          th:object="${turma}"
          method="post">

        <input type="hidden"
               th:field="*{idTurma}">

        <div class="mb-3">

            <label class="form-label">
                Nome da Turma
            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{nomeTurma}"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Período
            </label>

            <select class="form-select"
                    th:field="*{periodo}">

                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Noite">Noite</option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Sala
            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{sala}">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Ano
            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{ano}">

        </div>

        <button type="submit"
                class="btn btn-success">
            Salvar
        </button>

        <a th:href="@{/view/turmas}"
           class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
