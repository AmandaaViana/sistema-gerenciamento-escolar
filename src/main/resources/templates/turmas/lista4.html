<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema Escolar - Turmas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background-color:#f4f6f9;
            margin:0;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:#212529;
            color:white;
            display:flex;
            flex-direction:column;
        }

        .sidebar h3{
            text-align:center;
            padding:20px;
            border-bottom:1px solid #444;
        }

        .sidebar a{
            display:block;
            color:white;
            padding:15px 20px;
            text-decoration:none;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#0d6efd;
        }

        .logout-sidebar{
            margin-top:auto;
            padding:20px;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .table tbody tr:hover{
            background:#f1f1f1;
        }

        .topo{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .badge-id{
            font-size:14px;
        }

    </style>

</head>

<body>

<!-- MENU LATERAL -->

<div class="sidebar">

    <h3>
        <i class="fa-solid fa-school"></i>
        Escola
    </h3>

    <a th:href="@{/view/alunos}">
        <i class="fa-solid fa-user-graduate"></i>
        Alunos
    </a>

    <a th:href="@{/view/turmas}">
        <i class="fa-solid fa-users"></i>
        Turmas
    </a>

    <a th:href="@{/view/professores}">
        <i class="fa-solid fa-chalkboard-user"></i>
        Professores
    </a>

    <a th:href="@{/view/disciplinas}">
        <i class="fa-solid fa-book"></i>
        Disciplinas
    </a>

    <a th:href="@{/view/notas}">
        <i class="fa-solid fa-clipboard-check"></i>
        Notas
    </a>

    <a th:href="@{/cadastro}">
        <i class="fa-solid fa-clipboard-check"></i>
        Cadastro Usuario
    </a>


    <!-- LOGOUT MENU -->

    <div class="logout-sidebar">

        <form th:action="@{/logout}" method="post">

            <button type="submit"
                    class="btn btn-danger w-100">

                <i class="fa-solid fa-right-from-bracket"></i>
                Logout

            </button>

        </form>

    </div>

</div>

<!-- CONTEÚDO -->

<div class="content">

    <div class="topo">

        <h2>
            <i class="fa-solid fa-users"></i>
            Cadastro de Turmas
        </h2>

        <div class="d-flex gap-2">

            <a th:href="@{/view/turmas/novo}"
               class="btn btn-success">

                <i class="fa-solid fa-plus"></i>
                Nova Turma

            </a>

            <!-- LOGOUT TOPO -->

            <form th:action="@{/logout}" method="post">

                <button type="submit"
                        class="btn btn-danger">

                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout

                </button>

            </form>

        </div>

    </div>

    <div class="card">

        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Turma</th>
                        <th>Período</th>
                        <th>Sala</th>
                        <th>Ano</th>
                        <th width="180">Ações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="turma : ${turmas}">

                        <td>
                            <span class="badge bg-secondary badge-id"
                                  th:text="${turma.idTurma}">
                            </span>
                        </td>

                        <td th:text="${turma.nomeTurma}"></td>

                        <td>
                            <span class="badge bg-info"
                                  th:text="${turma.periodo}">
                            </span>
                        </td>

                        <td th:text="${turma.sala}"></td>

                        <td th:text="${turma.ano}"></td>

                        <td>

                            <a class="btn btn-warning btn-sm"
                               th:href="@{/view/turmas/editar/{id}(id=${turma.idTurma})}">

                                <i class="fa-solid fa-pen"></i>

                            </a>

                            <a class="btn btn-danger btn-sm"
                               th:href="@{/view/turmas/deletar/{id}(id=${turma.idTurma})}"
                               onclick="return confirm('Deseja excluir esta turma?')">

                                <i class="fa-solid fa-trash"></i>

                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(turmas)}">

                        <td colspan="6" class="text-center text-muted">

                            Nenhuma turma cadastrada.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
