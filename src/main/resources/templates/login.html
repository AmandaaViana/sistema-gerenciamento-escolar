<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Escolar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 400px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .card-header h2 {
            margin: 0;
            font-weight: bold;
        }

        .icon-login {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            font-weight: bold;
            border-radius: 10px;
        }

        .card-footer {
            text-align: center;
            background: white;
            border-top: none;
        }

        .form-control {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="card login-card">

    <div class="card-header">
        <div class="icon-login">🎓</div>
        <h2>Sistema Escolar</h2>
        <p class="mb-0">Acesso ao sistema</p>
    </div>

    <div class="card-body p-4">

        <form th:action="@{/login}" method="post" autocomplete="off">

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text"
                       name="username"
                       class="form-control"
                      autocomplete="off"
                       placeholder="Digite seu usuário"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password"
                       name="password"
                       class="form-control"
                        autocomplete="new-password"
                       placeholder="Digite sua senha"
                       required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Entrar
            </button>

        </form>

    </div>

    <div class="card-footer p-3">
        Não possui cadastro?
        <a th:href="@{/cadastro}" class="text-decoration-none fw-bold">
            Cadastre-se
        </a>
    </div>

</div>

</body>
</html>
