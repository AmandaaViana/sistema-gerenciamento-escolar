
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .card-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            font-weight: bold;
            font-size: 22px;
        }

        .btn {
            border-radius: 10px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow-lg">

                    <div class="card-header">
                        🎓 Cadastro de Aluno
                    </div>

                    <div class="card-body">

                        <form th:action="@{/view/alunos/salvar}" th:object="${aluno}" method="post">

                            <input type="hidden" th:field="*{idAluno}">

                            <div class="row">

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">
                                        Nome Completo
                                    </label>

                                    <input type="text" class="form-control" th:field="*{nome}" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        CPF
                                    </label>

                                    <input type="text" class="form-control" th:field="*{cpf}">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Telefone
                                    </label>

                                    <input type="text" class="form-control" th:field="*{telefone}">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        E-mail
                                    </label>

                                    <input type="email" class="form-control" th:field="*{email}">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Data Nascimento
                                    </label>

                                    <input type="date" class="form-control" th:field="*{dataNascimento}">
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">
                                        Endereço
                                    </label>

                                    <input type="text" class="form-control" th:field="*{endereco}">
                                </div>

                                <!-- TURMA OPCIONAL -->

                                <div class="col-md-12 mb-3">
                                    <label class="form-label">
                                        Turma (Opcional)
                                    </label>

                                    <select class="form-select" th:field="*{turma}">

                                        <option value="">
                                            Selecione uma turma ou Não
                                        </option>



                                        <option th:each="turma : ${turmas}" th:value="${turma.idTurma}"
                                            th:text="${turma.nomeTurma + ' - ' + turma.periodo}">
                                        </option>



                                    </select>
                                </div>

                            </div>

                            <hr>

                            <div class="d-flex justify-content-between">

                                <a th:href="@{/view/alunos}" class="btn btn-secondary">
                                    ← Voltar
                                </a>

                                <button type="submit" class="btn btn-success">
                                    💾 Salvar Aluno
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
```
