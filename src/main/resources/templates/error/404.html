<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:550px;
            background:#ffffff;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        h1{
            font-size:90px;
            color:#d9534f;
            margin-bottom:10px;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        p{
            color:#666;
            font-size:18px;
            line-height:1.6;
            margin-bottom:15px;
        }

        #contador{
            font-weight:bold;
            color:#d9534f;
            font-size:22px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
        }

        a:hover{
            background:#0b5ed7;
        }

        .icone{
            font-size:70px;
            margin-bottom:15px;
        }

        .rodape{
            margin-top:25px;
            color:#999;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="icone">🔍</div>

    <h1>404</h1>

    <h2>Página não encontrada</h2>

    <p>
        O endereço solicitado não existe, foi removido
        ou está temporariamente indisponível.
    </p>

    <p>
        Você será redirecionado automaticamente para
        <strong>Alunos</strong> em
        <span id="contador">6</span> segundos.
    </p>

    <a href="/view/alunos">
        Ir agora para Alunos
    </a>

    <div class="rodape">
        Sistema em fase de desenvolvimento.
    </div>

</div>

<script>
    let segundos = 6;

    const contador = document.getElementById("contador");

    const intervalo = setInterval(function() {
        segundos--;
        contador.textContent = segundos;

        if(segundos <= 0){
            clearInterval(intervalo);
            window.location.href = "/view/alunos";
        }
    }, 1000);
</script>

</body>
</html>
```
